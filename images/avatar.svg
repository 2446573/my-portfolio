<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1.5" y2="1.5">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="avatarGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" rx="200" fill="#0a0a0f"/>
  <circle cx="200" cy="200" r="200" fill="url(#bgGlow)"/>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#avatarGrad)" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="200" cy="200" r="186" fill="none" stroke="url(#avatarGrad)" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="6 8"/>
  <!-- Hair/head -->
  <ellipse cx="200" cy="155" rx="68" ry="72" fill="#1a1a2e"/>
  <ellipse cx="200" cy="160" rx="64" ry="66" fill="#1e1e32"/>
  <!-- Face -->
  <ellipse cx="200" cy="185" rx="52" ry="56" fill="#2a2a40"/>
  <!-- Eyes -->
  <ellipse cx="182" cy="178" rx="8" ry="5" fill="#0a0a0f"/>
  <ellipse cx="218" cy="178" rx="8" ry="5" fill="#0a0a0f"/>
  <circle cx="183" cy="177" r="3" fill="url(#avatarGrad)" opacity="0.8"/>
  <circle cx="219" cy="177" r="3" fill="url(#avatarGrad)" opacity="0.8"/>
  <!-- Eyebrows -->
  <path d="M172 168 Q182 164 192 167" stroke="#3a3a50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M208 167 Q218 164 228 168" stroke="#3a3a50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M200 183 L197 195 Q200 198 203 195 Z" fill="#252538"/>
  <!-- Mouth -->
  <path d="M188 205 Q200 214 212 205" stroke="#3a3a55" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Glasses -->
  <circle cx="182" cy="178" r="16" fill="none" stroke="url(#avatarGrad)" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="218" cy="178" r="16" fill="none" stroke="url(#avatarGrad)" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M198 178 L202 178" stroke="url(#avatarGrad)" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Body/shoulders -->
  <path d="M140 240 Q145 240 150 238 Q156 245 170 248 Q185 250 200 250 Q215 250 230 248 Q244 245 250 238 Q255 240 260 240" fill="#1a1a2e" stroke="none"/>
  <!-- Collar -->
  <path d="M180 240 L195 255 L200 248 L205 255 L220 240" fill="none" stroke="url(#avatarGrad)" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Decorative code brackets -->
  <text x="120" y="290" fill="#7C3AED" opacity="0.15" font-family="monospace" font-size="14">&lt;/&gt;</text>
  <text x="270" y="290" fill="#3B82F6" opacity="0.15" font-family="monospace" font-size="14">{ }</text>
  <!-- Name initial -->
  <text x="200" y="340" text-anchor="middle" fill="url(#avatarGrad)" font-family="system-ui" font-size="20" font-weight="700" opacity="0.6" filter="url(#avatarGlow)">AC</text>
</svg>